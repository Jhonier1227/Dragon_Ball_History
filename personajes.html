<!DOCTYPE html>
<!-- RESUMEN ARCHIVO: Pagina de personajes. Incluye navbar, buscador/filtro y contenedor para renderizado dinamico de tarjetas. -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personajes - Dragon Ball History</title>
  <link rel="icon" href="images/logos/LogoZ.png" type="image/png" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/personajes.css" />

  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-personajes navbar-dark">
    <div class="logo">
      <img src="images/logos/LogoPri.png" alt="Logo Dragon Ball" />
    </div>

    <div class="frase-dinamica-pro" id="frase-dinamica-pro">
      Descubre a todos los guerreros
    </div>

    <div class="menu-toggle" id="menu-toggle" aria-label="Abrir menu" role="button" tabindex="0">&#9776;</div>

    <ul class="menu" id="menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="historia.html">Historia</a></li>
      <li><a href="personajes.html" class="active">Personajes</a></li>
      <li><a href="galeria.html">Galeria</a></li>
      <li><a href="curiosidades.html">Curiosidades</a></li>
    </ul>

    <button id="modo-toggle" class="btn btn-outline-warning ms-3" title="Cambiar modo">Modo</button>
  </nav>

  <main id="seccion-personajes" class="container py-5">
    <header class="encabezado-personajes">
      <h1 class="titulo-personajes">Personajes Principales</h1>
      <p class="subtitulo-personajes">Explora sus transformaciones, historia y saga.</p>

      <div class="buscador-filtro" role="search">
        <input type="text" id="buscador-personajes" placeholder="Buscar personaje..." class="form-control" />
        <select id="filtro-saga" class="form-select" aria-label="Filtrar por saga">
          <option value="todos">Todas las sagas</option>
          <option value="dragon-ball">Dragon Ball</option>
          <option value="dragon-ball-z">Dragon Ball Z</option>
        </select>
      </div>
    </header>

    <section class="contenido-personajes" aria-live="polite">
      <div class="grid-personajes"></div>
      <p id="sin-resultados" class="sin-resultados" hidden>No se encontraron personajes con ese filtro.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollToPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.38/bundled/lenis.min.js"></script>

  <script src="js/global.js"></script>
  <script src="js/personajes.js"></script>
</body>
</html>
